<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Controle Barbearia</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins}

body{background:#000;color:#fff;display:flex}

/* LOGIN */

#login{
position:fixed;
width:100%;
height:100%;
background:#000;
display:flex;
justify-content:center;
align-items:center;
z-index:100;
}

.loginBox{
background:#111;
padding:40px;
border-radius:20px;
text-align:center;
}

.loginBox input{
padding:12px;
border:none;
border-radius:10px;
margin-top:10px;
}

.loginBox button{
margin-top:10px;
padding:10px 20px;
border:none;
border-radius:10px;
background:#fff;
cursor:pointer;
}

/* MENU */

.sidebar{
width:220px;
background:#0b0b0b;
height:100vh;
padding:20px;
}

.menu div{
padding:12px;
background:#111;
border-radius:10px;
margin-bottom:10px;
cursor:pointer;
}

.menu div:hover{
background:#fff;
color:#000;
}

.main{
flex:1;
padding:25px;
}

/* CARDS */

.cards{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:15px;
margin-bottom:20px;
}

.card{
background:#111;
padding:20px;
border-radius:15px;
text-align:center;
}

.valor{
font-size:24px;
margin-top:5px;
font-weight:bold;
}

/* CALENDARIO */

.calendario{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:12px;
margin-top:10px;
}

.diaBox{
background:#111;
padding:12px;
border-radius:12px;
text-align:center;
transition:0.2s;
}

.diaBox:hover{
transform:scale(1.05);
}

.hoje{
background:#fff;
color:#000;
}

/* CORTES */

.cortes{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
}

.corte{
background:#111;
padding:15px;
border-radius:10px;
text-align:center;
cursor:pointer;
}

.corte.active{
background:#fff;
color:#000;
}

/* BOTÃO */

button{
padding:10px 14px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
background:#fff;
color:#000;
}

</style>
</head>

<body>

<div id="login">
<div class="loginBox">
<h2>Acesso</h2>
<input type="password" id="senha">
<br>
<button onclick="entrar()">Entrar</button>
</div>
</div>

<div class="sidebar">
<h2>Barbearia</h2>
<div class="menu">
<div onclick="page(0)">Dashboard</div>
<div onclick="page(1)">Registrar</div>
</div>
</div>

<div class="main">

<div id="p0">

<div class="cards">
<div class="card">Hoje<div class="valor" id="dia">R$0</div></div>
<div class="card">Semana<div class="valor" id="semana">R$0</div></div>
<div class="card">Mês<div class="valor" id="mes">R$0</div></div>
</div>

<h3 id="dataAtual"></h3>

<div class="calendario" id="calendario"></div>

</div>

<div id="p1" style="display:none">
<div class="cortes" id="cortes"></div>
<br>
<button onclick="registrar()">Adicionar</button>
</div>

</div>

<script>

/* LOGIN */

if(localStorage.getItem("logado")){
document.getElementById("login").style.display="none"
}

function entrar(){
if(document.getElementById("senha").value==="Ferabaguera@1"){
localStorage.setItem("logado","true")
location.reload()
}else{
alert("Senha incorreta")
}
}

/* MENU */

function page(n){
document.querySelectorAll(".main > div").forEach(p=>p.style.display="none")
document.querySelectorAll(".main > div")[n].style.display="block"
}

/* CORTES */

const listaCortes=[
["Degradê Navalhado",30],
["Degradê Máquina",30],
["Corte Social",30],
["Barba",25],
["Sobrancelha",10],
["Pezinho",15],
["Bigode e Cavanhaque",15],
["Raspado Navalha",30],
["Pigmentação",50],
["Barba Pigmentada",35],
["Relaxamento",50],
["Luzes",130]
]

let selecionados=[]
let dados=JSON.parse(localStorage.getItem("dados")||"[]")

listaCortes.forEach(c=>{
let el=document.createElement("div")
el.className="corte"
el.innerHTML=`${c[0]}<br><b>R$${c[1]}</b>`
el.onclick=()=>{
el.classList.toggle("active")
if(selecionados.includes(c[0])){
selecionados=selecionados.filter(x=>x!==c[0])
}else{
selecionados.push(c[0])
}
}
cortes.appendChild(el)
})

function registrar(){
let agora=new Date()
selecionados.forEach(n=>{
let c=listaCortes.find(x=>x[0]==n)
dados.push({nome:n,valor:c[1],data:agora.toISOString()})
})
localStorage.setItem("dados",JSON.stringify(dados))
location.reload()
}

/* CALCULO */

function calcular(){

let hoje=new Date()
let inicioSemana=new Date()
inicioSemana.setDate(hoje.getDate()-hoje.getDay()+1)

let d=0,s=0,m=0

dados.forEach(r=>{
let data=new Date(r.data)

if(data.toDateString()==hoje.toDateString()) d+=r.valor
if(data>=inicioSemana && data<=hoje) s+=r.valor
if(data.getMonth()==hoje.getMonth()) m+=r.valor
})

dia.innerText="R$"+d
semana.innerText="R$"+s
mes.innerText="R$"+m

}

/* CALENDARIO */

function gerarCalendario(){

const hoje=new Date()
const ano=hoje.getFullYear()
const mes=hoje.getMonth()

const diasNoMes=new Date(ano,mes+1,0).getDate()

const diasSemana=["Dom","Seg","Ter","Qua","Qui","Sex","Sab"]

let html=""

for(let i=1;i<=diasNoMes;i++){

let data=new Date(ano,mes,i)

let total=0

dados.forEach(r=>{
let d=new Date(r.data)
if(d.getDate()==i && d.getMonth()==mes){
total+=r.valor
}
})

let classe = (i===hoje.getDate()) ? "diaBox hoje" : "diaBox"

html+=`
<div class="${classe}">
<b>${i}</b><br>
<small>${diasSemana[data.getDay()]}</small><br>
<b>R$${total}</b>
</div>
`
}

document.getElementById("calendario").innerHTML=html

document.getElementById("dataAtual").innerText=
hoje.toLocaleDateString("pt-BR",{weekday:"long",day:"numeric",month:"long"})
}

calcular()
gerarCalendario()

</script>

</body>
</html>
