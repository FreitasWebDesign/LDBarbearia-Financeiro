<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Controle Barbearia</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins}

body{background:#000;color:#fff;display:flex}

/* LOGIN */

#login{
position:fixed;
width:100%;
height:100%;
background:#000;
display:flex;
justify-content:center;
align-items:center;
z-index:100;
}

.loginBox{
background:#111;
padding:40px;
border-radius:20px;
text-align:center;
}

.loginBox input{
padding:12px;
border:none;
border-radius:10px;
margin-top:10px;
}

.loginBox button{
margin-top:10px;
padding:10px 20px;
border:none;
border-radius:10px;
background:#fff;
cursor:pointer;
}

/* MENU */

.sidebar{
width:220px;
background:#0b0b0b;
height:100vh;
padding:20px;
}

.menu div{
padding:12px;
background:#111;
border-radius:10px;
margin-bottom:10px;
cursor:pointer;
}

.menu div:hover{
background:#fff;
color:#000;
}

.main{
flex:1;
padding:25px;
}

/* DASHBOARD */

.cards{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:15px;
margin-bottom:20px;
}

.card{
background:#111;
padding:20px;
border-radius:15px;
text-align:center;
}

.valor{
font-size:24px;
margin-top:5px;
font-weight:bold;
}

/* BOTÕES */

.botoes{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-bottom:20px;
}

button{
padding:10px 14px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

.add{background:#fff;color:#000}
.del{background:#900;color:#fff}
.final{background:#444;color:#fff}

/* GRAFICO */

.graficoBox{
background:#111;
padding:20px;
border-radius:15px;
}

/* CORTES */

.cortes{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
}

.corte{
background:#111;
padding:15px;
border-radius:10px;
text-align:center;
cursor:pointer;
}

.corte.active{
background:#fff;
color:#000;
}

/* HISTORICO */

.item{
background:#111;
padding:10px;
border-radius:10px;
margin-bottom:10px;
display:flex;
justify-content:space-between;
}

</style>
</head>

<body>

<div id="login">
<div class="loginBox">
<h2>Acesso</h2>
<input type="password" id="senha" placeholder="Senha">
<br>
<button onclick="entrar()">Entrar</button>
</div>
</div>

<div class="sidebar">
<h2>Barbearia</h2>
<div class="menu">
<div onclick="page(0)">Dashboard</div>
<div onclick="page(1)">Registrar</div>
<div onclick="page(2)">Histórico</div>
<div onclick="page(3)">Finalizar</div>
</div>
</div>

<div class="main">

<div id="p0">

<div class="cards">
<div class="card">Hoje<div class="valor" id="dia">R$0</div></div>
<div class="card">Semana<div class="valor" id="semana">R$0</div></div>
<div class="card">Mês<div class="valor" id="mes">R$0</div></div>
<div class="card">Cortes<div class="valor" id="totalCortes">0</div></div>
</div>

<div class="botoes">
<button onclick="limparDia()">Limpar Dia</button>
<button onclick="limparSemana()">Limpar Semana</button>
<button onclick="limparMes()">Limpar Mês</button>
<button onclick="removerUltimo()">Limpar Último Corte</button>
<button onclick="apagarTudo()" class="del">Apagar Tudo</button>
</div>

<div class="graficoBox">
<canvas id="grafico"></canvas>
</div>

</div>

<div id="p1" style="display:none">
<div class="cortes" id="cortes"></div>
<br>
<button class="add" onclick="registrar()">Adicionar</button>
</div>

<div id="p2" style="display:none">
<div id="lista"></div>
</div>

<div id="p3" style="display:none">
<button class="final" onclick="finalDia()">Finalizar Dia</button>
<br><br>
<button class="final" onclick="finalSemana()">Finalizar Semana</button>
<br><br>
<button class="final" onclick="finalMes()">Finalizar Mês</button>
</div>

</div>

<script>

/* LOGIN */

function entrar(){
if(document.getElementById("senha").value==="Ferabaguera@1"){
document.getElementById("login").style.display="none"
}else{
alert("Senha incorreta")
}
}

/* MENU */

function page(n){
document.querySelectorAll(".main > div").forEach(p=>p.style.display="none")
document.querySelectorAll(".main > div")[n].style.display="block"
}

/* CORTES */

const listaCortes=[
["Degradê Navalhado",30],
["Degradê Máquina",30],
["Corte Social",30],
["Barba",25],
["Sobrancelha",10],
["Pezinho",15],
["Bigode e Cavanhaque",15],
["Raspado Navalha",30],
["Pigmentação",50],
["Barba Pigmentada",35],
["Relaxamento",50],
["Luzes",130]
]

let selecionados=[]
let dados=JSON.parse(localStorage.getItem("dados")||"[]")

listaCortes.forEach(c=>{
let el=document.createElement("div")
el.className="corte"
el.innerHTML=`${c[0]}<br><b>R$${c[1]}</b>`
el.onclick=()=>{
el.classList.toggle("active")
if(selecionados.includes(c[0])){
selecionados=selecionados.filter(x=>x!==c[0])
}else{
selecionados.push(c[0])
}
}
cortes.appendChild(el)
})

function registrar(){
let agora=new Date()
selecionados.forEach(n=>{
let c=listaCortes.find(x=>x[0]==n)
dados.push({nome:n,valor:c[1],data:agora.toISOString()})
})
localStorage.setItem("dados",JSON.stringify(dados))
location.reload()
}

/* CALCULO */

function calcular(){

let hoje=new Date()
let inicioSemana=new Date()
inicioSemana.setDate(hoje.getDate()-hoje.getDay()+1)

let d=0,s=0,m=0
let semana=[0,0,0,0,0,0]

dados.forEach(r=>{
let data=new Date(r.data)

if(data.toDateString()==hoje.toDateString()) d+=r.valor
if(data>=inicioSemana && data<=hoje) s+=r.valor
if(data.getMonth()==hoje.getMonth()) m+=r.valor

let dia=data.getDay()
if(dia>0 && dia<7) semana[dia-1]+=r.valor
})

dia.innerText="R$"+d
semana.innerText="R$"+s
mes.innerText="R$"+m
totalCortes.innerText=dados.length

grafico(semana)
}

function grafico(sem){
new Chart(document.getElementById("grafico"),{
type:"bar",
data:{
labels:["Seg","Ter","Qua","Qui","Sex","Sab"],
datasets:[{data:sem,backgroundColor:["#777","#aaa","#ccc","#666","#444","#222"]}]
}
})
}

function removerUltimo(){
dados.pop()
localStorage.setItem("dados",JSON.stringify(dados))
location.reload()
}

function apagarTudo(){
localStorage.clear()
location.reload()
}

function limparDia(){
let hoje=new Date().toDateString()
dados=dados.filter(r=>new Date(r.data).toDateString()!=hoje)
localStorage.setItem("dados",JSON.stringify(dados))
location.reload()
}

function limparSemana(){
let hoje=new Date()
let inicio=new Date()
inicio.setDate(hoje.getDate()-hoje.getDay()+1)
dados=dados.filter(r=>new Date(r.data)<inicio)
localStorage.setItem("dados",JSON.stringify(dados))
location.reload()
}

function limparMes(){
let mesAtual=new Date().getMonth()
dados=dados.filter(r=>new Date(r.data).getMonth()!=mesAtual)
localStorage.setItem("dados",JSON.stringify(dados))
location.reload()
}

function finalDia(){alert("Dia finalizado! 💈")}
function finalSemana(){alert("Semana finalizada! 🔥")}
function finalMes(){alert("Mês finalizado! 🏆")}

calcular()

</script>

</body>
</html>
